name: NOIRAX Signal Pipeline

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  generate-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: |
          cd pipeline
          pip install -r requirements.txt

      - name: Run signal pipeline
        id: pipeline
        run: |
          cd pipeline
          python run_signals.py
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER || 'gemini' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SIGNALS_MIN_VOLUME_24H_USD: ${{ vars.SIGNALS_MIN_VOLUME_24H_USD || '1000000' }}
          # Proprietary pipeline parameters (configurable via GitHub Variables)
          TECH_TOP_COINS_FREE: ${{ vars.TECH_TOP_COINS_FREE || '15' }}
          TECH_RSI_OVERSOLD: ${{ vars.TECH_RSI_OVERSOLD || '35' }}
          TECH_RSI_OVERBOUGHT: ${{ vars.TECH_RSI_OVERBOUGHT || '65' }}
          TECH_CONFIDENCE_RSI: ${{ vars.TECH_CONFIDENCE_RSI || '20' }}
          TECH_CONFIDENCE_MACD: ${{ vars.TECH_CONFIDENCE_MACD || '15' }}
          TECH_CONFIDENCE_SMA: ${{ vars.TECH_CONFIDENCE_SMA || '15' }}
          TECH_CONFIDENCE_VOLUME: ${{ vars.TECH_CONFIDENCE_VOLUME || '10' }}
          TECH_CONFIDENCE_SUPPORT: ${{ vars.TECH_CONFIDENCE_SUPPORT || '15' }}
          TECH_CONFIDENCE_RESISTANCE: ${{ vars.TECH_CONFIDENCE_RESISTANCE || '10' }}
          TECH_VOLUME_SPIKE_MULTIPLIER: ${{ vars.TECH_VOLUME_SPIKE_MULTIPLIER || '1.5' }}
          TECH_NEAR_SUPPORT_OFFSET: ${{ vars.TECH_NEAR_SUPPORT_OFFSET || '1.05' }}
          TECH_NEAR_RESISTANCE_OFFSET: ${{ vars.TECH_NEAR_RESISTANCE_OFFSET || '0.95' }}
          TECH_RISK_HIGH_THRESHOLD: ${{ vars.TECH_RISK_HIGH_THRESHOLD || '0.05' }}
          TECH_RISK_MEDIUM_THRESHOLD: ${{ vars.TECH_RISK_MEDIUM_THRESHOLD || '0.03' }}
          TECH_ATR_SL_CONSERVATIVE: ${{ vars.TECH_ATR_SL_CONSERVATIVE || '1.5' }}
          TECH_ATR_TP1_CONSERVATIVE: ${{ vars.TECH_ATR_TP1_CONSERVATIVE || '2.0' }}
          TECH_ATR_SL_OPTIMIZED: ${{ vars.TECH_ATR_SL_OPTIMIZED || '2.0' }}
          TECH_ATR_TP1_OPTIMIZED: ${{ vars.TECH_ATR_TP1_OPTIMIZED || '2.0' }}
          TECH_ATR_TP2_OPTIMIZED: ${{ vars.TECH_ATR_TP2_OPTIMIZED || '3.5' }}
          TECH_ATR_TP3_OPTIMIZED: ${{ vars.TECH_ATR_TP3_OPTIMIZED || '5.0' }}
          FUND_WHALE_THRESHOLD_BTC: ${{ vars.FUND_WHALE_THRESHOLD_BTC || '20.0' }}
          FUND_FUNDING_RATE_HIGH: ${{ vars.FUND_FUNDING_RATE_HIGH || '0.0005' }}
          FUND_FUNDING_RATE_LOW: ${{ vars.FUND_FUNDING_RATE_LOW || '-0.0005' }}
          FUND_FUNDING_RATE_ELEVATED: ${{ vars.FUND_FUNDING_RATE_ELEVATED || '0.0002' }}
          FUND_VOLUME_QUOTE_THRESHOLD: ${{ vars.FUND_VOLUME_QUOTE_THRESHOLD || '50000000' }}
          FUND_VOLUME_PRICE_CHANGE_PCT: ${{ vars.FUND_VOLUME_PRICE_CHANGE_PCT || '5.0' }}
          FUND_VOLUME_ELEVATED_CHANGE_PCT: ${{ vars.FUND_VOLUME_ELEVATED_CHANGE_PCT || '2.0' }}
          FUND_SCORE_CLAMP_HIGH: ${{ vars.FUND_SCORE_CLAMP_HIGH || '3' }}
          FUND_SCORE_CLAMP_MEDIUM: ${{ vars.FUND_SCORE_CLAMP_MEDIUM || '1' }}
          FUND_SCORE_CLAMP_NEG_HIGH: ${{ vars.FUND_SCORE_CLAMP_NEG_HIGH || '-3' }}
          FUND_SCORE_CLAMP_NEG_MEDIUM: ${{ vars.FUND_SCORE_CLAMP_NEG_MEDIUM || '-1' }}
          FUND_NEWS_BULL_MIN_COUNT: ${{ vars.FUND_NEWS_BULL_MIN_COUNT || '2' }}

      - name: Heartbeat - commit status
        run: |
          git config user.name "noirax-bot"
          git config user.email "bot@noirax.ai"
          git add pipeline/status.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: pipeline heartbeat [skip ci]"
          git push origin master || echo "No changes to push"
